<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#08080c" />
  <title>Platfooorm Movie</title>
  <link rel="icon" type="image/png" href="/Platfooorm-Movie/icon.png" />
  <link rel="apple-touch-icon" href="/Platfooorm-Movie/icon.png" />

  <meta property="og:title" content="Platfooorm Movie" />
  <meta property="og:description" content="AI destekli film keşif uygulaması" />
  <meta property="og:image" content="https://developer262391-lang.github.io/Platfooorm-Movie/icon.png" />

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    :root {
      --bg: #08080c;
      --accent: #e50914;
      --accent-hover: #ff0a17;
      --accent-glow: rgba(229, 9, 20, 0.4);
      --text: #ffffff;
      --text-dim: #b5b5c3;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Inter", Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      position: relative;
      overflow: hidden;
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 20% 30%, rgba(229, 9, 20, 0.18), transparent 50%),
        radial-gradient(circle at 80% 70%, rgba(80, 30, 200, 0.15), transparent 50%);
      pointer-events: none;
      animation: ambient 12s ease-in-out infinite;
    }
    @keyframes ambient {
      0%, 100% { opacity: 0.8; }
      50%      { opacity: 1; }
    }
    .wrap {
      max-width: 480px;
      width: 100%;
      text-align: center;
      position: relative;
      z-index: 1;
      animation: rise 0.8s cubic-bezier(0.2, 0.9, 0.3, 1.1) both;
    }
    .icon {
      width: 96px;
      height: 96px;
      border-radius: 24px;
      margin-bottom: 24px;
      box-shadow:
        0 20px 60px rgba(0, 0, 0, 0.5),
        0 0 0 1px rgba(255, 255, 255, 0.05);
    }
    h1 {
      font-size: 36px;
      font-weight: 800;
      letter-spacing: -0.5px;
      margin-bottom: 12px;
      background: linear-gradient(135deg, #fff 0%, #b5b5c3 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .tagline {
      color: var(--accent);
      font-weight: 700;
      font-size: 13px;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 28px;
    }
    p {
      color: var(--text-dim);
      line-height: 1.6;
      font-size: 15px;
      margin-bottom: 36px;
    }
    .features {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 36px;
    }
    .feature {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      padding: 16px 12px;
      border-radius: 14px;
      font-size: 12px;
      color: var(--text-dim);
    }
    .feature-icon {
      font-size: 24px;
      display: block;
      margin-bottom: 6px;
    }
    a.btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 18px 36px;
      background: var(--accent);
      color: #fff;
      text-decoration: none;
      border-radius: 14px;
      font-weight: 700;
      font-size: 16px;
      box-shadow: 0 8px 24px var(--accent-glow);
      transition: transform 0.15s ease, background 0.2s ease;
    }
    a.btn:hover { background: var(--accent-hover); }
    a.btn:active { transform: scale(0.97); }

    @keyframes rise {
      from { transform: translateY(20px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <img src="/Platfooorm-Movie/icon.png" alt="Platfooorm Movie" class="icon" />
    <h1>Platfooorm Movie</h1>
    <div class="tagline" data-i18n="tagline">AI Destekli Film Keşfi</div>
    <p data-i18n="desc">
      Türkçe arayüz, akıllı film önerileri, devasa katalog ve kişisel AI film asistanı.
      Tek uygulamada her şey.
    </p>
    <div class="features">
      <div class="feature"><span class="feature-icon">🤖</span><span data-i18n="f1">AI Asistan</span></div>
      <div class="feature"><span class="feature-icon">🎬</span><span data-i18n="f2">Devasa Katalog</span></div>
      <div class="feature"><span class="feature-icon">⭐</span><span data-i18n="f3">Akıllı Öneriler</span></div>
      <div class="feature"><span class="feature-icon">🎯</span><span data-i18n="f4">Şanslı Çark</span></div>
    </div>
    <a class="btn" href="https://play.google.com/store/apps/details?id=com.ckapps.test5">
      📥 <span data-i18n="cta">Play Store'dan İndir</span>
    </a>
  </div>

  <script>
    var STRINGS = {
      tr: { tagline: "AI Destekli Film Keşfi",
            desc: "Türkçe arayüz, akıllı film önerileri, devasa katalog ve kişisel AI film asistanı. Tek uygulamada her şey.",
            f1: "AI Asistan", f2: "Devasa Katalog", f3: "Akıllı Öneriler", f4: "Şanslı Çark",
            cta: "Play Store'dan İndir" },
      en: { tagline: "AI-Powered Movie Discovery",
            desc: "Smart movie recommendations, huge catalog, and a personal AI movie assistant. Everything in one app.",
            f1: "AI Assistant", f2: "Huge Catalog", f3: "Smart Picks", f4: "Lucky Spin",
            cta: "Get it on Play Store" },
      es: { tagline: "Descubrimiento de películas con IA",
            desc: "Recomendaciones inteligentes, gran catálogo y asistente de cine con IA. Todo en una app.",
            f1: "Asistente IA", f2: "Gran Catálogo", f3: "Recomendaciones", f4: "Ruleta",
            cta: "Descargar en Play Store" },
      de: { tagline: "KI-gestützte Filmentdeckung",
            desc: "Intelligente Filmempfehlungen, riesiger Katalog und persönlicher KI-Filmassistent. Alles in einer App.",
            f1: "KI-Assistent", f2: "Riesiger Katalog", f3: "Empfehlungen", f4: "Glücksrad",
            cta: "Im Play Store laden" },
      fr: { tagline: "Découverte de films par IA",
            desc: "Recommandations intelligentes, énorme catalogue et assistant IA personnel. Tout dans une seule app.",
            f1: "Assistant IA", f2: "Grand Catalogue", f3: "Recommandations", f4: "Roue Chance",
            cta: "Disponible sur Play Store" },
      ar: { tagline: "اكتشاف الأفلام بالذكاء الاصطناعي",
            desc: "توصيات أفلام ذكية، كتالوج ضخم، ومساعد أفلام شخصي بالذكاء الاصطناعي. كل شيء في تطبيق واحد.",
            f1: "مساعد ذكي", f2: "كتالوج ضخم", f3: "توصيات ذكية", f4: "عجلة الحظ",
            cta: "حمّل من Play Store" }
    };
    var lang = (navigator.language || "en").toLowerCase().split("-")[0];
    var t = STRINGS[lang] || STRINGS.en;
    document.documentElement.lang = lang in STRINGS ? lang : "en";
    if (lang === "ar") document.documentElement.dir = "rtl";
    document.querySelectorAll("[data-i18n]").forEach(function (el) {
      var k = el.getAttribute("data-i18n");
      if (t[k]) el.textContent = t[k];
    });
  </script>
</body>
</html>
