<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0b0b10" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />

  <title>Platfooorm Movie</title>
  <link rel="icon" type="image/png" href="/Platfooorm-Movie/icon.png" />
  <link rel="apple-touch-icon" href="/Platfooorm-Movie/icon.png" />

  <!-- Open Graph (WhatsApp / Telegram / Facebook zengin önizleme) -->
  <meta property="og:type" content="video.movie" />
  <meta property="og:site_name" content="Platfooorm Movie" />
  <meta property="og:title" id="og-title" content="Platfooorm Movie" />
  <meta property="og:description" id="og-desc" content="Watch this movie on the Platfooorm Movie app." />
  <meta property="og:image" id="og-image" content="https://developer262391-lang.github.io/Platfooorm-Movie/icon.png" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" id="tw-title" content="Platfooorm Movie" />
  <meta name="twitter:description" id="tw-desc" content="Watch this movie on the Platfooorm Movie app." />
  <meta name="twitter:image" id="tw-image" content="https://developer262391-lang.github.io/Platfooorm-Movie/icon.png" />

  <style>
    :root {
      --bg: #08080c;
      --bg-card: #15151c;
      --bg-elev: #1c1c26;
      --accent: #e50914;
      --accent-hover: #ff0a17;
      --accent-glow: rgba(229, 9, 20, 0.4);
      --text: #ffffff;
      --text-dim: #b5b5c3;
      --text-faint: #6b6b78;
      --border: rgba(255, 255, 255, 0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Inter", Roboto, sans-serif;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    /* ─── Backdrop hero ─────────────────────────────────────────── */
    .backdrop {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 60vh;
      background-size: cover;
      background-position: center top;
      filter: blur(8px) saturate(1.2);
      transform: scale(1.15);
      opacity: 0;
      transition: opacity 1.2s ease;
      z-index: 0;
    }
    .backdrop.loaded { opacity: 0.55; }
    .backdrop::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(
        180deg,
        rgba(8, 8, 12, 0.4) 0%,
        rgba(8, 8, 12, 0.7) 40%,
        rgba(8, 8, 12, 0.95) 75%,
        var(--bg) 100%
      );
    }

    /* ─── Layout ────────────────────────────────────────────────── */
    .wrap {
      position: relative;
      z-index: 1;
      max-width: 480px;
      margin: 0 auto;
      padding: 24px 20px 60px;
      min-height: 100vh;
    }

    /* ─── Header ────────────────────────────────────────────────── */
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
      animation: slideDown 0.6s ease both;
    }
    .header img {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.4);
    }
    .header-text {
      display: flex;
      flex-direction: column;
    }
    .header-title {
      font-size: 16px;
      font-weight: 800;
      letter-spacing: 0.3px;
    }
    .header-sub {
      font-size: 11px;
      color: var(--text-dim);
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    /* ─── Loading ───────────────────────────────────────────────── */
    .loading {
      padding: 80px 20px;
      text-align: center;
      color: var(--text-dim);
    }
    .spinner {
      width: 48px;
      height: 48px;
      border: 3px solid rgba(255, 255, 255, 0.08);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── Content ───────────────────────────────────────────────── */
    .content { display: none; }
    .content.show { display: block; animation: fadeUp 0.7s ease both; }

    .poster-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 24px;
    }
    .poster {
      width: 220px;
      aspect-ratio: 2 / 3;
      border-radius: 16px;
      object-fit: cover;
      box-shadow:
        0 20px 60px rgba(0, 0, 0, 0.6),
        0 0 0 1px rgba(255, 255, 255, 0.05);
      transform: translateY(20px);
      opacity: 0;
      animation: posterIn 0.8s 0.1s cubic-bezier(0.2, 0.9, 0.3, 1.2) forwards;
    }
    .title {
      font-size: 28px;
      font-weight: 800;
      line-height: 1.15;
      text-align: center;
      margin-bottom: 12px;
      animation: fadeUp 0.6s 0.3s both;
    }
    .meta {
      display: flex;
      justify-content: center;
      gap: 16px;
      flex-wrap: wrap;
      color: var(--text-dim);
      font-size: 13px;
      margin-bottom: 22px;
      animation: fadeUp 0.6s 0.4s both;
    }
    .meta-item {
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }
    .meta-rating { color: #ffc83d; font-weight: 600; }

    .genres {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      justify-content: center;
      margin-bottom: 24px;
      animation: fadeUp 0.6s 0.5s both;
    }
    .genre {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(10px);
      padding: 6px 12px;
      border-radius: 100px;
      font-size: 11px;
      color: var(--text-dim);
      border: 1px solid var(--border);
    }

    .overview {
      color: var(--text-dim);
      font-size: 14px;
      line-height: 1.6;
      margin-bottom: 32px;
      text-align: left;
      animation: fadeUp 0.6s 0.6s both;
    }
    .overview-clamp {
      display: -webkit-box;
      -webkit-line-clamp: 4;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .overview-toggle {
      color: var(--accent);
      font-weight: 600;
      font-size: 13px;
      cursor: pointer;
      margin-top: 6px;
      display: inline-block;
    }

    /* ─── CTA Buttons ───────────────────────────────────────────── */
    .cta-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
      animation: fadeUp 0.6s 0.7s both;
    }
    .cta {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 18px 20px;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 700;
      text-decoration: none;
      border: none;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.2s ease, background 0.2s ease;
      font-family: inherit;
    }
    .cta:active { transform: scale(0.97); }
    .cta-primary {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 8px 24px var(--accent-glow);
    }
    .cta-primary:hover { background: var(--accent-hover); }
    .cta-secondary {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(10px);
      color: var(--text);
      border: 1px solid var(--border);
    }
    .cta-secondary:hover { background: rgba(255, 255, 255, 0.12); }
    .cta-icon {
      font-size: 20px;
      line-height: 1;
    }

    .hint {
      text-align: center;
      color: var(--text-faint);
      font-size: 11px;
      margin-top: 18px;
      animation: fadeUp 0.6s 0.9s both;
    }

    .err {
      padding: 60px 20px;
      text-align: center;
      color: var(--text-dim);
    }
    .err-icon {
      font-size: 56px;
      margin-bottom: 16px;
      opacity: 0.3;
    }

    /* ─── Animations ────────────────────────────────────────────── */
    @keyframes slideDown {
      from { transform: translateY(-12px); opacity: 0; }
      to   { transform: translateY(0);     opacity: 1; }
    }
    @keyframes fadeUp {
      from { transform: translateY(16px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }
    @keyframes posterIn {
      from { transform: translateY(30px) scale(0.9); opacity: 0; }
      to   { transform: translateY(0)    scale(1);   opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 8px 24px var(--accent-glow); }
      50%      { box-shadow: 0 8px 32px rgba(229, 9, 20, 0.7); }
    }
    .cta-primary { animation: pulse 2.5s ease-in-out infinite; }
  </style>
</head>
<body>
  <div class="backdrop" id="backdrop"></div>

  <div class="wrap">
    <div class="header">
      <img src="/Platfooorm-Movie/icon.png" alt="Platfooorm Movie" />
      <div class="header-text">
        <div class="header-title">Platfooorm Movie</div>
        <div class="header-sub" data-i18n="tagline">AI Destekli Film Keşfi</div>
      </div>
    </div>

    <div id="loading" class="loading">
      <div class="spinner"></div>
      <span data-i18n="loading">Film bilgileri yükleniyor...</span>
    </div>

    <div id="content" class="content">
      <div class="poster-wrap">
        <img id="poster" class="poster" src="" alt="" />
      </div>
      <h1 id="title" class="title"></h1>
      <div id="meta" class="meta"></div>
      <div id="genres" class="genres"></div>
      <p id="overview" class="overview overview-clamp"></p>
      <span id="overview-toggle" class="overview-toggle" style="display:none;" data-i18n="readMore">Devamını oku</span>

      <div class="cta-group">
        <a id="btn-open" class="cta cta-primary" href="#">
          <span class="cta-icon">▶</span>
          <span data-i18n="watchInApp">Filmi Uygulamada İzle</span>
        </a>
        <a id="btn-store" class="cta cta-secondary"
           href="https://play.google.com/store/apps/details?id=com.ckapps.test5">
          <span class="cta-icon">📥</span>
          <span data-i18n="downloadApp">Uygulamayı İndir</span>
        </a>
      </div>

      <div class="hint" data-i18n="hint">
        Uygulama yüklü değilse Play Store açılır.
      </div>
    </div>

    <div id="error" class="err" style="display:none;">
      <div class="err-icon">🎬</div>
      <p data-i18n="notFound">Film bulunamadı.</p>
      <br />
      <a class="cta cta-primary"
         href="https://play.google.com/store/apps/details?id=com.ckapps.test5"
         style="display:inline-flex; padding:14px 28px;">
        <span data-i18n="downloadApp">Uygulamayı İndir</span>
      </a>
    </div>
  </div>

  <script>
    (function () {
      // ─── Config ────────────────────────────────────────────────
      var TMDB_BEARER = "eyJhbGciOiJIUzI1NiJ9.eyJhdWQiOiIxZmRjM2QwMGJmMmFkODQ2ZjBlYzliMTk5OGJhYTBmOCIsInN1YiI6IjY1ZWNiMjY5Mjc5MGJmMDE3YzQzM2Q1YiIsInNjb3BlcyI6WyJhcGlfcmVhZCJdLCJ2ZXJzaW9uIjoxfQ.QjJOz1OuBaI3UZUVIeC_UCsLn5oplMb4zel4H1-uTPQ";
      var APP_PACKAGE = "com.ckapps.test5";
      var APP_SCHEME  = "platfooormmovie";
      var PLAY_URL    = "https://play.google.com/store/apps/details?id=" + APP_PACKAGE;

      // ─── i18n ──────────────────────────────────────────────────
      // UI strings: tr & en. Other languages fall back to English.
      var STRINGS = {
        tr: {
          tagline:     "AI Destekli Film Keşfi",
          loading:     "Film bilgileri yükleniyor...",
          watchInApp:  "Filmi Uygulamada İzle",
          downloadApp: "Uygulamayı İndir",
          hint:        "Uygulama yüklü değilse Play Store açılır.",
          notFound:    "Film bulunamadı.",
          readMore:    "Devamını oku",
          readLess:    "Daha az göster",
          noOverview:  "Açıklama bulunamadı.",
          minutes:     "dk",
          openInApp:   "Uygulamada Aç",
          shareDesc:   "Bu filmi Platfooorm Movie uygulamasında izle."
        },
        en: {
          tagline:     "AI-Powered Movie Discovery",
          loading:     "Loading movie info...",
          watchInApp:  "Watch in App",
          downloadApp: "Download App",
          hint:        "If the app isn't installed, Play Store will open.",
          notFound:    "Movie not found.",
          readMore:    "Read more",
          readLess:    "Show less",
          noOverview:  "No description available.",
          minutes:     "min",
          openInApp:   "Open in App",
          shareDesc:   "Watch this movie on the Platfooorm Movie app."
        }
      };

      // Map browser locale → TMDB locale (ISO 639-1 + ISO 3166-1)
      // TMDB will fall back to English internally if a translation is missing.
      var TMDB_LOCALE_MAP = {
        tr: "tr-TR", en: "en-US", es: "es-ES", fr: "fr-FR", de: "de-DE",
        it: "it-IT", pt: "pt-BR", ru: "ru-RU", ja: "ja-JP", ko: "ko-KR",
        zh: "zh-CN", ar: "ar-SA", hi: "hi-IN", nl: "nl-NL", pl: "pl-PL",
        sv: "sv-SE", uk: "uk-UA", id: "id-ID", th: "th-TH", vi: "vi-VN",
        cs: "cs-CZ", el: "el-GR", he: "he-IL", ro: "ro-RO", hu: "hu-HU",
        fa: "fa-IR", ur: "ur-PK", bg: "bg-BG", da: "da-DK", fi: "fi-FI",
        no: "no-NO", sk: "sk-SK", sr: "sr-RS", hr: "hr-HR"
      };

      // ─── Detect language ───────────────────────────────────────
      var browserLang = (navigator.language || navigator.userLanguage || "en")
                          .toLowerCase().split("-")[0];
      var uiLang      = STRINGS[browserLang] ? browserLang : "en";
      var tmdbLocale  = TMDB_LOCALE_MAP[browserLang] || "en-US";
      var t = STRINGS[uiLang];

      // Apply i18n to all elements with data-i18n
      document.documentElement.lang = uiLang;
      var i18nNodes = document.querySelectorAll("[data-i18n]");
      for (var i = 0; i < i18nNodes.length; i++) {
        var key = i18nNodes[i].getAttribute("data-i18n");
        if (t[key]) i18nNodes[i].textContent = t[key];
      }

      // ─── Read params ───────────────────────────────────────────
      // Supported:
      //   tmdbId    → TMDB id (used for poster/info AND deep link)
      //   id        → backend film id (adult or normal)
      //   type      → '1' = normal, '2' = adult  (projenin movieType konvansiyonu)
      //   mediaType → 'movie' | 'tv'  (TMDB media type, default: movie)
      //   actor     → optional, passed through
      //   ref       → optional referral tag
      var params    = new URLSearchParams(window.location.search);
      var tmdbId    = params.get("tmdbId");
      var localId   = params.get("id");
      var movieType = params.get("type") || "1";
      var mediaType = params.get("mediaType") || "movie";
      var isAdult   = movieType === "2";
      var actor     = params.get("actor");
      var ref       = params.get("ref");

      if (!tmdbId && !localId) {
        document.getElementById("loading").style.display = "none";
        document.getElementById("error").style.display = "block";
        return;
      }

      // ─── Build deep link (preserve every param) ────────────────
      // The native side reads the same query keys from route.params and
      // a custom getStateFromPath in App.js routes to the right screen.
      var qParts = [];
      if (tmdbId)    qParts.push("tmdbId="    + tmdbId);
      if (localId)   qParts.push("id="        + localId);
      qParts.push("type=" + movieType);
      if (mediaType) qParts.push("mediaType=" + mediaType);
      if (actor)     qParts.push("actor="     + encodeURIComponent(actor));
      if (ref)       qParts.push("ref="       + encodeURIComponent(ref));
      var queryStr = "?" + qParts.join("&");
      var deepLink = APP_SCHEME + "://film" + queryStr;

      var triedApp = false;
      function tryOpenApp() {
        if (triedApp) return;
        triedApp = true;
        var ua = navigator.userAgent || "";
        if (/android/i.test(ua)) {
          window.location.href =
            "intent://film" + queryStr + "#Intent;scheme=" + APP_SCHEME +
            ";package=" + APP_PACKAGE +
            ";S.browser_fallback_url=" + encodeURIComponent(PLAY_URL) + ";end";
        } else {
          window.location.href = deepLink;
        }
      }

      // ─── Generic landing (no TMDB id) ──────────────────────────
      // For backend-only IDs (e.g. adult content) we can't fetch TMDB,
      // so show a minimal landing with the app icon and CTA buttons.
      function showGenericLanding() {
        var title = isAdult ? "Platfooorm Movie 18+" : "Platfooorm Movie";
        document.getElementById("title").textContent = title;
        document.getElementById("poster").src = "/Platfooorm-Movie/icon.png";
        document.getElementById("poster").style.objectFit = "contain";
        document.getElementById("poster").style.background = "#15151c";
        document.getElementById("poster").style.padding = "40px";
        document.getElementById("overview").textContent = t.shareDesc;

        document.getElementById("btn-open").addEventListener("click", function (e) {
          e.preventDefault();
          triedApp = false;
          tryOpenApp();
        });

        document.getElementById("loading").style.display = "none";
        document.getElementById("content").classList.add("show");
      }

      if (!tmdbId) {
        showGenericLanding();
        setTimeout(tryOpenApp, 500);
        window.addEventListener("pageshow", function () {
          document.getElementById("loading").style.display = "none";
        });
        return;
      }

      // ─── Fetch TMDB ─────────────────────────────────────────────
      // Strategy: fetch in user's locale. If overview is missing (TMDB
      // doesn't have a translation), fetch en-US and merge missing fields.
      function tmdbFetch(locale) {
        var url = "https://api.themoviedb.org/3/" + mediaType + "/" + tmdbId +
                  "?language=" + locale;
        return fetch(url, {
          headers: {
            "Authorization": "Bearer " + TMDB_BEARER,
            "Accept": "application/json"
          }
        }).then(function (r) { return r.ok ? r.json() : Promise.reject(r); });
      }

      tmdbFetch(tmdbLocale)
        .then(function (primary) {
          // If overview/title missing, fall back to English and merge
          var needsFallback = !primary.overview ||
                              (!primary.title && !primary.name);
          if (!needsFallback || tmdbLocale === "en-US") {
            return primary;
          }
          return tmdbFetch("en-US").then(function (fallback) {
            return {
              ...fallback,
              ...Object.fromEntries(
                Object.entries(primary).filter(function (kv) { return kv[1]; })
              )
            };
          }).catch(function () { return primary; });
        })
        .then(function (m) {
          var title    = m.title || m.name || "Film";
          var year     = (m.release_date || m.first_air_date || "").slice(0, 4);
          var rating   = m.vote_average ? m.vote_average.toFixed(1) : null;
          var runtime  = m.runtime ? m.runtime + " " + t.minutes :
                         (m.episode_run_time && m.episode_run_time[0] ? m.episode_run_time[0] + " " + t.minutes : null);
          var overview = m.overview || "";
          var genres   = (m.genres || []).map(function (g) { return g.name; });
          var poster   = m.poster_path
            ? "https://image.tmdb.org/t/p/w500" + m.poster_path
            : "";
          var backdrop = m.backdrop_path
            ? "https://image.tmdb.org/t/p/w1280" + m.backdrop_path
            : "";

          // Page title + meta
          document.title = title + (year ? " (" + year + ") " : " ") + "· Platfooorm Movie";
          document.getElementById("og-title").content = title + (year ? " (" + year + ")" : "");
          document.getElementById("tw-title").content = title + (year ? " (" + year + ")" : "");
          if (overview) {
            document.getElementById("og-desc").content = overview.slice(0, 160);
            document.getElementById("tw-desc").content = overview.slice(0, 160);
          }
          if (backdrop) {
            document.getElementById("og-image").content = backdrop;
            document.getElementById("tw-image").content = backdrop;
            // Hero backdrop
            var img = new Image();
            img.onload = function () {
              var bd = document.getElementById("backdrop");
              bd.style.backgroundImage = "url('" + backdrop + "')";
              bd.classList.add("loaded");
            };
            img.src = backdrop;
          }

          // Title + meta
          document.getElementById("title").textContent = title;
          var metaParts = [];
          if (year)    metaParts.push('<span class="meta-item">📅 ' + year + '</span>');
          if (rating)  metaParts.push('<span class="meta-item meta-rating">★ ' + rating + '</span>');
          if (runtime) metaParts.push('<span class="meta-item">⏱ ' + runtime + '</span>');
          document.getElementById("meta").innerHTML = metaParts.join("");

          // Genres
          var genresEl = document.getElementById("genres");
          genres.slice(0, 4).forEach(function (g) {
            var span = document.createElement("span");
            span.className = "genre";
            span.textContent = g;
            genresEl.appendChild(span);
          });

          // Overview + read more
          var ovEl = document.getElementById("overview");
          ovEl.textContent = overview || t.noOverview;
          if (overview && overview.length > 200) {
            var toggle = document.getElementById("overview-toggle");
            toggle.style.display = "inline-block";
            toggle.addEventListener("click", function () {
              var isClamped = ovEl.classList.toggle("overview-clamp");
              toggle.textContent = isClamped ? t.readMore : t.readLess;
            });
          }

          // Poster
          if (poster) {
            document.getElementById("poster").src = poster;
            document.getElementById("poster").alt = title;
          } else {
            document.getElementById("poster").style.display = "none";
          }

          // Manual "Open in app" button
          document.getElementById("btn-open").addEventListener("click", function (e) {
            e.preventDefault();
            triedApp = false;
            tryOpenApp();
          });

          // Show
          document.getElementById("loading").style.display = "none";
          document.getElementById("content").classList.add("show");
        })
        .catch(function (err) {
          console.error("TMDB fetch failed:", err);
          document.getElementById("loading").style.display = "none";
          document.getElementById("error").style.display = "block";
        });

      // Auto-trigger app open after a small delay
      setTimeout(tryOpenApp, 500);

      window.addEventListener("pageshow", function () {
        document.getElementById("loading").style.display = "none";
      });
    })();
  </script>
</body>
</html>
